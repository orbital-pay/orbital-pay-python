name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > /tmp/pr_diff.txt
          if [ -s /tmp/pr_diff.txt ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Claude Review
        if: steps.diff.outputs.has_diff == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          pip install anthropic -q

          python3 << 'PYEOF'
          import os
          import anthropic

          diff = open("/tmp/pr_diff.txt").read()
          pr_title = os.environ.get("PR_TITLE", "")
          pr_body = os.environ.get("PR_BODY", "")

          # Truncate diff if too large (keep under 100k chars)
          if len(diff) > 100000:
              diff = diff[:100000] + "\n\n... [diff truncated due to size]"

          prompt = f"""You are a senior code reviewer. Review this pull request and provide constructive feedback.

          ## PR Title: {pr_title}

          ## PR Description:
          {pr_body}

          ## Diff:
          ```
          {diff}
          ```

          Provide a review with:
          1. **Summary** - Brief overview of changes
          2. **Issues** - Any bugs, security concerns, or logic errors (if none, say so)
          3. **Suggestions** - Improvements for code quality, performance, or readability
          4. **Verdict** - APPROVE, REQUEST_CHANGES, or COMMENT

          Be concise. Focus on what matters. Skip trivial style nits."""

          client = anthropic.Anthropic()

          try:
              message = client.messages.create(
                  model="claude-sonnet-4-5-20250514",
                  max_tokens=4096,
                  messages=[{"role": "user", "content": prompt}]
              )
              review = message.content[0].text
          except anthropic.APIError as e:
              review = f"Review failed: {e.message}"
          except Exception as e:
              review = f"Review failed: {str(e)}"

          with open("/tmp/review.txt", "w") as f:
              f.write(review)
          PYEOF

      - name: Post Review Comment
        if: steps.diff.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat /tmp/review.txt)
          # Use a temp file for the comment body to avoid shell escaping
          cat > /tmp/comment.txt << COMMENT_EOF
          ## Claude Code Review

          ${BODY}

          ---
          *Automated review by Claude*
          COMMENT_EOF

          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment.txt
